services:
  db:
    image: mysql:8
    container_name: stream4-db
    environment:
      MYSQL_DATABASE: stream4
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: stream4-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      MYSQL_DATABASE: stream4
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      JWT_SECRET: QEWQEQWKLEJQEKLQWJELKQEJLKQWDQKLWNDLKASD
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: