<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>

    <div class="auth-container">
    <h1>Stream4</h1>

    <!-- LOGIN FORM -->
    <div id="loginSection">
        <p class="subtitle">Sign in to continue</p>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="primary-btn">Login</button>
        </form>
        <p class="divider">or</p>
        <button class="secondary-btn" id="registerBtn">Create Account</button>
    </div>

    <!-- REGISTER FORM (hidden by default) -->
    <div id="registerSection" style="display:none">
        <p class="subtitle">Create an account</p>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password (min 8 chars)" required>
            <button type="submit" class="primary-btn">Register</button>
        </form>
        <p class="divider">or</p>
        <button class="secondary-btn" id="backToLoginBtn">Back to Login</button>
    </div>
</div>

<script src="js/auth.js"></script>
    
</body>
</html>
