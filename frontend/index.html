<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>StreamFlix – Sign In</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>

    <div class="auth-container">
    <h1>Stream4</h1>

    <!-- LOGIN FORM -->
    <div id="loginSection">
        <p class="subtitle">Sign in to continue</p>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="primary-btn">Login</button>
        </form>
        <p class="forgot" id="forgotBtn">Forgot password?</p>
        <p class="divider">or</p>
        <button class="secondary-btn" id="registerBtn">Create Account</button>
    </div>

    <!-- REGISTER FORM (hidden by default) -->
    <div id="registerSection" style="display:none">
        <p class="subtitle">Create an account</p>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password (min 8 chars)" required>
            <button type="submit" class="primary-btn">Register</button>
        </form>
        <p class="divider">or</p>
        <button class="secondary-btn" id="backToLoginBtn">Back to Login</button>
    </div>

    <!-- FORGOT PASSWORD FORM (hidden by default) -->
    <div id="forgotSection" style="display:none">
        <p class="subtitle">Reset your password</p>
        <form id="forgotForm">
            <input type="email" id="forgotEmail" placeholder="Enter your email" required>
            <button type="submit" class="primary-btn">Send Reset Link</button>
        </form>
        <p class="divider">or</p>
        <button class="secondary-btn" id="backToLoginFromForgot">Back to Login</button>
    </div>

    <!-- RESET PASSWORD FORM (hidden by default) -->
    <div id="resetSection" style="display:none">
        <p class="subtitle">Enter new password</p>
        <form id="resetForm">
            <input type="text" id="resetToken" placeholder="Paste reset token from email" required>
            <input type="password" id="resetPassword" placeholder="New password (min 8 chars)" required>
            <button type="submit" class="primary-btn">Reset Password</button>
        </form>
        <p class="divider">or</p>
        <button class="secondary-btn" id="backToLoginFromReset">Back to Login</button>
    </div>
</div>

<script src="js/auth.js"></script>
    
</body>
</html>
