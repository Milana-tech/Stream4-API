openapi: 3.1.0
info:
  title: StreamFlix API
  version: v1
servers:
  - url: http://localhost:8080
    description: Generated server url
security:
  - bearerAuth: []
tags:
  - name: profiles
    description: Endpoints to manage user profiles (supports JSON, XML, CSV)
  - name: seasons
    description: Manage series seasons (supports JSON, XML, CSV)
  - name: trial-management
    description: Manage 7-day trial period (supports JSON, XML, CSV)
  - name: viewing-behaviour
    description: Track user viewing behaviour and progress (supports JSON, XML, CSV)
  - name: employees
    description: Employee-specific operations (supports JSON, XML, CSV)
  - name: preferences
    description: Manage profile viewing preferences (supports JSON, XML, CSV)
  - name: playback
    description: Playback quality resolution based on user subscription and profile
  - name: episodes
    description: Manage series episodes (supports JSON, XML, CSV)
  - name: titles
    description: Endpoints to manage movies and series (supports JSON, XML, CSV)
  - name: watchlists
    description: Manage user watchlist (supports JSON, XML, CSV)
  - name: invitations
    description: Invite new users to StreamFlix
  - name: users
    description: Endpoints to manage users
  - name: subscription-management
    description: Manage paid subscriptions (supports JSON, XML, CSV)
  - name: auth
    description: Endpoints for login and logout
  - name: referral-management
    description: Manage invite discounts (supports JSON, XML, CSV)
paths:
  /profiles/{profileId}/preferences:
    get:
      tags:
        - preferences
      summary: Get preferences
      description: Get viewing preferences for a profile. Supports JSON, XML, CSV.
      operationId: getPreferences
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
    put:
      tags:
        - preferences
      summary: Update preferences
      description: Update viewing preferences for a profile. Supports JSON, XML, CSV.
      operationId: updatePreferences
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
  /profiles/{id}:
    get:
      tags:
        - profiles
      summary: Get profile by ID
      description: Get specific profile. Supports JSON, XML, CSV.
      operationId: getProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '403':
          description: Forbidden - profile belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
    put:
      tags:
        - profiles
      summary: Update profile
      description: Update a profile
      operationId: updateProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          description: Invalid input - validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '403':
          description: Forbidden - profile belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
    delete:
      tags:
        - profiles
      summary: Delete profile
      description: Delete a profile
      operationId: deleteProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Profile deleted successfully
        '401':
          description: Unauthorized - JWT token missing or invalid
        '403':
          description: Forbidden - profile belongs to another user
        '404':
          description: Profile not found
  /employees/profile/{id}/deactivate:
    put:
      tags:
        - employees
      summary: Deactivate profile
      description: Deactivate a user profile. Supports JSON, XML, CSV.
      operationId: deactivateProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
  /employees/profile/{id}/activate:
    put:
      tags:
        - employees
      summary: Activate profile
      description: Activate a user profile. Supports JSON, XML, CSV.
      operationId: activateProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileStatusResponse'
  /watchlists:
    get:
      tags:
        - watchlists
      summary: Get watchlist
      description: Get profile's watchlist. Supports JSON, XML, CSV.
      operationId: getAll
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchlistItemResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchlistItemResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchlistItemResponse'
    post:
      tags:
        - watchlists
      summary: Add to watchlist
      description: Add a title to user's watchlist. Supports JSON, XML, CSV.
      operationId: add
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWatchlistItemRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
  /viewing-behaviour/watch:
    post:
      tags:
        - viewing-behaviour
      summary: Record watch event
      description: Record a viewing event with progress. Supports JSON, XML, CSV.
      operationId: watch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWatchEventRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
  /titles:
    get:
      tags:
        - titles
      summary: Get all titles
      description: Get all movies and series. Supports JSON, XML, CSV.
      operationId: getAll_1
      responses:
        '200':
          description: Titles retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TitleResponse'
    post:
      tags:
        - titles
      summary: Create title
      description: Create a new movie or series
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTitleRequest'
        required: true
      responses:
        '201':
          description: Title created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/TitleResponse'
        '400':
          description: Invalid input - validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/TitleResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/TitleResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/TitleResponse'
  /titles/{titleId}/seasons:
    get:
      tags:
        - seasons
      summary: Get seasons
      description: Get all seasons for a series. Supports JSON, XML, CSV.
      operationId: getAll_2
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeasonResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeasonResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeasonResponse'
    post:
      tags:
        - seasons
      summary: Create season
      description: Create a new season for a series. Supports JSON, XML, CSV.
      operationId: create_1
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSeasonRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SeasonResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/SeasonResponse'
  /subscriptions:
    post:
      tags:
        - subscription-management
      summary: Create subscription
      description: Create a paid subscription (converts trial if active). Supports JSON, XML, CSV.
      operationId: createSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
        required: true
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Invalid input - validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '409':
          description: User already has an active subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
      security:
        - bearerAuth: []
  /seasons/{seasonId}/episodes:
    get:
      tags:
        - episodes
      summary: Get episodes
      description: Get all episodes for a season. Supports JSON, XML, CSV.
      operationId: getAll_3
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpisodeResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpisodeResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpisodeResponse'
    post:
      tags:
        - episodes
      summary: Create episode
      description: Create a new episode for a season. Supports JSON, XML, CSV.
      operationId: create_2
      parameters:
        - name: seasonId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEpisodeRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/EpisodeResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/EpisodeResponse'
  /referrals/apply-discount/{inviteeId}:
    post:
      tags:
        - referral-management
      summary: Apply referral discount
      description: Apply referral discount to both inviter and invitee. Supports JSON, XML, CSV.
      operationId: applyReferralDiscount
      parameters:
        - name: inviteeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralDiscountResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ReferralDiscountResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ReferralDiscountResponse'
      security:
        - bearerAuth: []
  /profiles:
    get:
      tags:
        - profiles
      summary: Get profiles
      description: Get all profiles for the authenticated user. Supports JSON, XML, CSV.
      operationId: getProfiles
      responses:
        '200':
          description: Profiles retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProfileResponse'
    post:
      tags:
        - profiles
      summary: Create profile
      description: Create a new profile for the authenticated user
      operationId: createProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
        required: true
      responses:
        '201':
          description: Profile created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '400':
          description: Invalid input - validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized - JWT token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
  /invitations:
    get:
      tags:
        - invitations
      summary: Get sent invitations
      description: Get all invitations sent by the current user, including discount status and validity period
      operationId: getSent
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitationResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitationResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitationResponse'
    post:
      tags:
        - invitations
      summary: Send invitation
      description: Send an invitation link to a new user by email
      operationId: invite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
  /auth/reset-password:
    post:
      tags:
        - auth
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /auth/register:
    post:
      tags:
        - auth
      summary: Register as a user
      description: Register a user in the system
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          description: Successfully created a user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
  /auth/login:
    post:
      tags:
        - auth
      summary: Login as a user
      description: Logins a user into the system
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successfully logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/UserLoginResponse'
  /auth/forgot-password:
    post:
      tags:
        - auth
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /viewing-behaviour/progress/{titleId}:
    get:
      tags:
        - viewing-behaviour
      summary: Get viewing progress
      description: Get viewing progress for a specific title. Supports JSON, XML, CSV.
      operationId: progress
      parameters:
        - name: titleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
            text/csv:
              schema:
                $ref: '#/components/schemas/WatchEventResponse'
  /viewing-behaviour/history:
    get:
      tags:
        - viewing-behaviour
      summary: Get watch history
      description: Get profile's viewing history. Supports JSON, XML, CSV.
      operationId: history
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchEventResponse'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchEventResponse'
            text/csv:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchEventResponse'
  /users:
    get:
      tags:
        - users
      summary: Get all users
      description: Retrieve a list of all users. Supports JSON, XML, and CSV formats via Accept header.
      operationId: getAllUsers
      responses:
        '200':
          description: Successfully retrieved list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
            application/xml:
              schema:
                type: array
                items:
